{% extends "base.html" %}
{% block title %}SecureVote — Register{% endblock %}
{% block body_class %}flex items-center justify-center min-h-screen{% endblock %}
{% block content %}
<main class="w-full max-w-[500px] mx-auto p-margin">
    <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant shadow-[0_4px_6px_-1px_rgb(0_0_0/0.05)] overflow-hidden">
        <div class="p-lg border-b border-outline-variant bg-surface-container-low flex items-center gap-sm">
            <span class="material-symbols-outlined text-primary">key</span>
            <h2 class="text-h2 font-semibold text-on-surface">Registration — RSA Blind Signature</h2>
        </div>
        <div class="p-xl space-y-lg">
            <div class="space-y-sm">
                <label class="text-label uppercase text-on-surface-variant block">Voter ID</label>
                <input type="text" id="voter_id" placeholder="e.g. voter_123" required class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-2.5 text-[13px] font-mono text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
            </div>
            <div class="space-y-sm">
                <label class="text-label uppercase text-on-surface-variant block">Secret Code</label>
                <input type="password" id="secret_code" placeholder="6-digit code" required class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-2.5 text-[13px] font-mono text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
            </div>
            <button onclick="performBlindSignature()" class="w-full bg-primary text-on-primary text-[13px] font-semibold py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-primary/90 transition-colors border-b-[3px] border-primary-fixed-dim"><span class="material-symbols-outlined text-[18px]">key</span>Perform Blind Signature</button>
            <div id="status-console" class="hidden bg-inverse-surface text-inverse-on-surface rounded-xl p-md font-mono text-[11px] break-all"></div>
        </div>
    </div>
</main>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='crypto.js') }}"></script>
<script>
async function performBlindSignature(){
    var vid=document.getElementById('voter_id').value.trim(),sc=document.getElementById('secret_code').value.trim();
    if(!vid||!sc)return alert("Fill both fields");
    var c=document.getElementById('status-console');c.classList.remove('hidden');c.innerHTML='> Fetching keys...<br>';
    try{var r=await fetch('/api/public-keys');var k=await r.json();var N=BigInt(k.rsa.N),E=BigInt(k.rsa.e);
    var tok='tok_'+vid+'_'+Math.floor(Math.random()*1e9);c.innerHTML+='> Token: '+tok+'<br>';
    var{blinded,r:bf}=await CryptoUtils.blindToken(tok,N,E);c.innerHTML+='> Sending to RA...<br>';
    var sr=await fetch('/api/register/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voter_id:vid,secret_code:sc,blinded_token:blinded})});
    var sd=await sr.json();if(sd.error)throw new Error(sd.error);
    var cred=CryptoUtils.unblindSignature(sd.blind_signature,bf,N);
    sessionStorage.setItem("voter_id",vid);sessionStorage.setItem("voter_token",tok);sessionStorage.setItem("voter_credential",cred);
    c.innerHTML+='<span class="text-secondary-fixed">> SUCCESS! Redirecting...</span><br>';
    setTimeout(function(){window.location.href='/vote';},1500);
    }catch(e){c.innerHTML+='<span class="text-error">> ERROR: '+e.message+'</span><br>';}
}
</script>
{% endblock %}
